<!DOCTYPE html>
<html>
<head>
<style>
  @font-face {
    font-family: 'Switzer';
    src: url('src/fonts/Switzer-Variable.woff2') format('woff2');
    font-weight: 100 900;
  }
  @font-face {
    font-family: 'General Sans';
    src: url('src/fonts/GeneralSans-Variable.woff2') format('woff2');
    font-weight: 100 900;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #1B6B4A;
    display: flex;
    align-items: center;
    overflow: hidden;
    position: relative;
  }
  .accent {
    position: absolute;
    right: -180px;
    top: -180px;
    width: 560px;
    height: 560px;
    border-radius: 50%;
    background: #3A8F68;
    opacity: 0.35;
  }
  .accent2 {
    position: absolute;
    right: 60px;
    bottom: -260px;
    width: 480px;
    height: 480px;
    border-radius: 50%;
    background: #E8F5EE;
    opacity: 0.08;
  }
  .content {
    position: relative;
    padding: 0 96px;
    max-width: 980px;
  }
  .label {
    font-family: 'General Sans', sans-serif;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #E8F5EE;
    margin-bottom: 28px;
  }
  h1 {
    font-family: 'Switzer', sans-serif;
    font-size: 92px;
    font-weight: 700;
    letter-spacing: -0.025em;
    line-height: 1.05;
    color: #ffffff;
    margin-bottom: 32px;
  }
  p {
    font-family: 'General Sans', sans-serif;
    font-size: 32px;
    font-weight: 400;
    line-height: 1.45;
    color: #E8F5EE;
    max-width: 820px;
  }
</style>
</head>
<body>
  <div class="accent"></div>
  <div class="accent2"></div>
  <div class="content">
    <div class="label">healthmaps.com.au</div>
    <h1>HealthMaps</h1>
    <p>Mental health support in Australia, explained — pathways, costs and practitioners in plain language.</p>
  </div>
</body>
</html>
