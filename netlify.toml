[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Deny local-network access so Chrome never shows the "apps on device" /
    # local-network permission prompt (seen on Android via carrier-DNS false
    # positives). The site makes same-origin requests only, so nothing breaks.
    # local-network-access is the legacy alias; local-network + loopback-network
    # are the current spec tokens.
    Permissions-Policy = "local-network-access=(), local-network=(), loopback-network=()"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
